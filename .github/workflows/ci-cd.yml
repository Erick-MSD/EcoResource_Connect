name: CI/CD Pipeline - Google Cloud Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: ecoresource-backend
  IMAGE_NAME: gcr.io/${{ secrets.GCP_PROJECT_ID }}/ecoresource-backend

jobs:
  # ============================================
  # JOB 1: Tests y Linting
  # ============================================
  test:
    name: Tests & Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 🟢 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: 📥 Install dependencies
        working-directory: ./backend
        run: pnpm install --no-frozen-lockfile

      - name: 🔍 Run ESLint
        working-directory: ./backend
        run: pnpm run lint || echo "ESLint completed"

      - name: 🧪 Run Jest tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: test_jwt_secret_for_ci_pipeline_2026
          JWT_REFRESH_SECRET: test_jwt_refresh_secret_for_ci_pipeline_2026
          NODE_OPTIONS: --max-old-space-size=4096
        run: pnpm test -- --coverage --maxWorkers=2

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage/lcov.info
          flags: backend
          name: backend-${{ matrix.node-version }}

  # ============================================
  # JOB 2: SonarCloud Analysis
  # ============================================
  sonarqube:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for better analysis

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: 📥 Install dependencies
        working-directory: ./backend
        run: pnpm install --no-frozen-lockfile

      - name: 🧪 Run tests with coverage
        working-directory: ./backend
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: test_jwt_secret_for_ci_pipeline_2026
          JWT_REFRESH_SECRET: test_jwt_refresh_secret_for_ci_pipeline_2026
          NODE_OPTIONS: --max-old-space-size=4096
        run: pnpm test -- --coverage

      - name: 🔍 SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ============================================
  # JOB 3: OWASP ZAP Security Scan
  # ============================================
  security:
    name: OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    needs: test

    services:
      mongodb:
        image: mongo:6.0
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: test_password
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: 📥 Install dependencies
        working-directory: ./backend
        run: pnpm install --no-frozen-lockfile

      - name: 🚀 Start backend server
        working-directory: ./backend
        env:
          NODE_ENV: production
          PORT: 5000
          MONGODB_URI: mongodb://admin:test_password@localhost:27017/ecoresource_test?authSource=admin
          JWT_SECRET: test_jwt_secret_for_zap_scan_2026
          JWT_REFRESH_SECRET: test_jwt_refresh_secret_for_zap_scan_2026
          CORS_ORIGIN: http://localhost:3000
        run: |
          pnpm start &
          echo $! > server.pid
          sleep 10

      - name: 🔒 Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:5000'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          allow_issue_writing: false

      - name: 📊 Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json

      - name: 🛑 Stop backend server
        if: always()
        run: |
          if [ -f backend/server.pid ]; then
            kill $(cat backend/server.pid) || true
          fi

  # ============================================
  # JOB 4: Build & Push Docker Image (GCP)
  # ============================================
  build:
    name: Build & Push to GCR
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ☁️ Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 🐳 Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: 🏗️ Build Docker image
        working-directory: ./backend
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:${{ github.ref_name }} \
            --build-arg NODE_ENV=production \
            .

      - name: 🚀 Push Docker image to GCR
        run: |
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      - name: 📋 Image details
        run: |
          echo "✅ Image pushed successfully!"
          echo "📦 Image: ${{ env.IMAGE_NAME }}"
          echo "🏷️ Tags: latest, ${{ github.sha }}, ${{ github.ref_name }}"

  # ============================================
  # JOB 5: Deploy to Cloud Run
  # ============================================
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ☁️ Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 🚀 Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --port=5000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=60 \
            --concurrency=80 \
            --set-env-vars="NODE_ENV=production,PORT=5000,CORS_ORIGIN=${{ secrets.FRONTEND_URL }}" \
            --set-secrets="JWT_SECRET=JWT_SECRET:latest,JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest,MONGODB_URI=MONGODB_URI:latest"

      - name: 🌐 Get Service URL
        id: service-url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "✅ Service deployed at: $SERVICE_URL"

      - name: 🏥 Health Check
        run: |
          sleep 10
          curl -f ${{ steps.service-url.outputs.url }}/health || exit 1
          echo "✅ Health check passed!"

      - name: 🧪 Test Deployment
        run: |
          echo "Testing authentication endpoint..."
          curl -f ${{ steps.service-url.outputs.url }}/api/v1/auth/profile -H "Authorization: Bearer invalid_token" -w "%{http_code}" -s -o /dev/null | grep -q "401" && echo "✅ Auth endpoint working!"

  # ============================================
  # JOB 6: Notify Deployment Status
  # ============================================
  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()

    steps:
      - name: 📢 Deployment Success
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ Deployment to Cloud Run successful!"
          echo "🌐 Service URL: https://${{ env.SERVICE_NAME }}-xxxxx-uc.a.run.app"
          echo "📊 Check metrics at: https://console.cloud.google.com/run"

      - name: ❌ Deployment Failed
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment failed!"
          echo "🔍 Check logs at: https://console.cloud.google.com/logs"
          exit 1

      - name: ⏭️ Deployment Skipped
        if: needs.deploy.result == 'skipped'
        run: |
          echo "⏭️ Deployment skipped (not main branch)"
          echo "✅ Tests and build completed successfully"
