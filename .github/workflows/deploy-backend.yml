name: 🚀 Deploy Backend to Google Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: # Permite ejecución manual

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: ecoresource-backend
  IMAGE_NAME: gcr.io/${{ secrets.GCP_PROJECT_ID }}/ecoresource-backend

jobs:
  deploy:
    name: 🚀 Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ☁️ Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: 🐳 Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: 🏗️ Build Docker image
        working-directory: ./backend
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:v${{ github.run_number }} \
            .

      - name: 📤 Push image to GCR
        run: |
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:v${{ github.run_number }}

      - name: 🚀 Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --allow-unauthenticated \
            --port=5000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=300 \
            --set-secrets="JWT_SECRET=JWT_SECRET:latest,JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest,MONGODB_URI=MONGODB_URI:latest" \
            --set-env-vars="NODE_ENV=production,PORT=5000" \
            --project=${{ secrets.GCP_PROJECT_ID }}

      - name: 🌐 Get Service URL
        id: get-url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --platform=managed \
            --region=${{ env.REGION }} \
            --format='value(status.url)' \
            --project=${{ secrets.GCP_PROJECT_ID }})
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "✅ Backend desplegado en: $SERVICE_URL"

      - name: 🧪 Health Check
        run: |
          echo "🔍 Verificando health check..."
          sleep 10
          curl -f ${{ steps.get-url.outputs.service_url }}/health || exit 1
          echo "✅ Health check OK"

      - name: 📊 Deployment Summary
        run: |
          echo "# 🎉 Deployment Exitoso" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region:** ${{ env.REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ steps.get-url.outputs.service_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build #:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
