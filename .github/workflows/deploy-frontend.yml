name: 🚀 Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch: # Permite ejecución manual

# Permisos necesarios para GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '10'

jobs:
  build:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: 📥 Install dependencies
        working-directory: ./frontend
        run: pnpm install --frozen-lockfile

      - name: 🔨 Build production bundle
        working-directory: ./frontend
        env:
          # URL del backend desplegado en GCP
          VITE_API_URL: https://ecoresource-backend-1028586104605.us-central1.run.app
          VITE_APP_NAME: "EcoResource Connect"
          VITE_ENABLE_ANALYTICS: "true"
        run: pnpm build

      - name: 📄 Setup Pages
        uses: actions/configure-pages@v4

      - name: 📦 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist

  deploy:
    name: 🚀 Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Deployment complete
        run: |
          echo "✅ Frontend desplegado exitosamente!"
          echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"
