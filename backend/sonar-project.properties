# Configuración de SonarQube para EcoResource Connect

# Información del proyecto
sonar.projectKey=ecoresource-connect
sonar.projectName=EcoResource Connect
sonar.projectVersion=1.0.0

# Rutas de código fuente y pruebas
sonar.sources=src
sonar.tests=tests

# Exclusiones
sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/*.test.js
sonar.test.inclusions=tests/**/*.test.js
sonar.coverage.exclusions=**/*.test.js,**/tests/**,**/config/**

# Reportes de cobertura
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Configuración de lenguaje
sonar.language=js
sonar.sourceEncoding=UTF-8

# Umbrales de calidad (Quality Gates)
sonar.qualitygate.wait=true

# Métricas específicas
sonar.javascript.node.maxspace=4096

# Análisis de duplicación
sonar.cpd.exclusions=**/*.test.js

# Configuración de issues
sonar.issue.ignore.multicriteria=e1,e2

# Ignorar issues específicos
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.test.js

sonar.issue.ignore.multicriteria.e2.ruleKey=javascript:S1192
sonar.issue.ignore.multicriteria.e2.resourceKey=**/constants.js
