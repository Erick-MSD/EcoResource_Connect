# ================================================
# SONARCLOUD CONFIGURATION
# ================================================
# Project identification
sonar.projectKey=Erick-MSD_EcoResource_Connect
sonar.organization=erick-msd

# Project metadata
sonar.projectName=EcoResource Connect
sonar.projectVersion=1.0.0

# Path to source files
sonar.sources=backend/src
sonar.tests=backend/tests

# Encoding
sonar.sourceEncoding=UTF-8

# JavaScript/Node.js specific settings
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.js,**/*.spec.js,**/dist/**,**/build/**

# Test exclusions
sonar.test.exclusions=**/tests/**,**/*.test.js,**/*.spec.js

# Coverage exclusions (files not to include in coverage)
sonar.coverage.exclusions=**/tests/**,**/*.test.js,**/*.spec.js,**/config/**,**/server.js
